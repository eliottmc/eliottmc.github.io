<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Sauvegarde le chemin demandé et redirige vers index.html
      const path = window.location.pathname + window.location.search;
      sessionStorage.setItem('redirectPath', path);
      window.location.replace('/');  // ou '/nom-du-repo/' si sous-dossier
    </script>
  </head>
</html>
